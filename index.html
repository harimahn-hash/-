<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADEF 캠페인 디자인 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-96 border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-purple-400">✨ 통합 대시보드 로그인</h2>
            <input type="password" id="entry-code" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 mb-4 text-center text-xl tracking-widest" placeholder="입장코드 입력">
            <button onclick="checkCode()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold p-3 rounded-lg">입장하기</button>
            <p id="login-error" class="text-red-400 text-sm mt-3 text-center hidden">코드가 일치하지 않습니다.</p>
        </div>
    </div>

    <div id="main-dashboard" class="container mx-auto p-6 hidden">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white">ADEF 디자인 일정 관리 시스템</h1>
                <p class="text-gray-400 text-sm mt-1">실시간 필터링 및 다중 조건 정렬 기능이 지원됩니다.</p>
            </div>
            <button onclick="fetchData()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm px-4 py-2 rounded-lg border border-gray-700">🔄 새로고침</button>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-6 shadow-lg">
            <h3 class="text-lg font-bold text-purple-400 mb-4">📝 신규 디자인 일정 요청 (기획자용)</h3>
            <form id="request-form" class="flex flex-wrap gap-4 items-end" onsubmit="createRow(event)">
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs text-gray-400 mb-1">브랜드</label>
                    <select id="input-brand" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white">
                        <option value="헤어바디 통합">헤어바디 통합</option>
                        <option value="일리윤">일리윤</option>
                        <option value="라보에이치">라보에이치</option>
                        <option value="려">려</option>
                        <option value="롱테이크">롱테이크</option>
                        <option value="스킨유">스킨유</option>
                        <option value="에스트라">에스트라</option>
                    </select>
                </div>
                <div class="flex-[2] min-w-[200px]">
                    <label class="block text-xs text-gray-400 mb-1">캠페인 / 항목명</label>
                    <input type="text" id="input-title" required placeholder="예: 생필품의 모든것 소재" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white">
                </div>
                <div class="flex-1 min-w-[130px]">
                    <label class="block text-xs text-gray-400 mb-1">예정요청일</label>
                    <input type="date" id="input-reqDate" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white">
                </div>
                <div class="flex-1 min-w-[130px]">
                    <label class="block text-xs text-gray-400 mb-1">예상수급일</label>
                    <input type="date" id="input-dueDate" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white">
                </div>
                <div class="flex-[2] min-w-[150px]">
                    <label class="block text-xs text-gray-400 mb-1">요청 링크</label>
                    <input type="url" id="input-link" placeholder="https://..." class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white">
                </div>
                <button type="submit" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-2 rounded-lg text-sm transition h-[38px]">요청 등록</button>
            </form>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6 flex flex-wrap gap-4 items-center">
            <div>
                <label class="block text-xs text-gray-400 mb-1 font-semibold">브랜드 필터</label>
                <select id="brand-filter" onchange="renderTable()" class="bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white w-44 focus:outline-none focus:border-purple-500">
                    <option value="전체">전체 브랜드</option>
                    <option value="헤어바디 통합">헤어바디 통합</option>
                    <option value="일리윤">일리윤</option>
                    <option value="라보에이치">라보에이치</option>
                    <option value="려">려</option>
                    <option value="롱테이크">롱테이크</option>
                    <option value="스킨유">스킨유</option>
                    <option value="에스트라">에스트라</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 font-semibold">진행 상태</label>
                <select id="status-filter" onchange="renderTable()" class="bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm text-white w-44 focus:outline-none focus:border-purple-500">
                    <option value="전체">전체 상태</option>
                    <option value="요청예정">요청예정</option>
                    <option value="요청완료">요청완료</option>
                    <option value="진행중">진행중</option>
                    <option value="수정중">수정중</option>
                    <option value="제작완료">제작완료</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 font-semibold text-purple-400">📊 정렬 기준</label>
                <select id="sort-filter" onchange="renderTable()" class="bg-gray-700 border border-purple-500/50 rounded-lg p-2 text-sm text-white w-48 focus:outline-none focus:border-purple-500 font-medium">
                    <option value="최신순">최신 등록순</option>
                    <option value="예정요청일순">예정요청일 빠른순</option>
                    <option value="예상수급일순">예상수급일 빠른순</option>
                    <option value="진행상태순">진행 상태순</option>
                    <option value="브랜드순">브랜드 가나다순</option>
                </select>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-750 border-b border-gray-700 text-gray-300 text-sm font-semibold">
                        <th class="p-4">브랜드</th>
                        <th class="p-4">캠페인 / 항목명</th>
                        <th class="p-4">예정요청일</th>
                        <th class="p-4">예상수급일</th>
                        <th class="p-4">진행 상태</th>
                        <th class="p-4">링크</th>
                        <th class="p-4 text-center">삭제</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-sm text-gray-300 divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const MASTER_CODE = "adef2026";
        
        // ⚠️ 본인의 Supabase 주소와 키를 입력해 주세요!
        const SUPABASE_URL = "https://wnuvsowwjwfgatzmdynj.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndudXZzb3d3andmZ2F0em1keW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NjE1OTMsImV4cCI6MjA5OTIzNzU5M30.63xL4XbHW4iGht4PW7EpYsjUXdrGrhRt9VvnWmltSxk";
        
        let supabaseClient;
        let allRequests = []; // 실시간 정렬 및 필터를 위한 전역 데이터 저장소

        function checkCode() {
            const input = document.getElementById('entry-code').value;
            if(input === MASTER_CODE) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // 1. 데이터베이스에서 원본 가져오기 (Read)
        async function fetchData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-gray-500">데이터를 동기화 중입니다...</td></tr>`;

            const { data, error } = await supabaseClient
                .from('design_requests')
                .select('*');

            if (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-400">데이터를 가져오지 못했습니다.<br>에러 원인: ${error.message}
